<!-- Vista de libros favoritos -->
<div class="contenedor-favoritos">

  <!-- Cabecera con título, contador y enlace para volver -->
  <div class="cabecera-favoritos">
    <h2>❤️ Mis favoritos</h2>

    <span class="contador-favoritos">
      {{ librosFavoritos.length }} libro{{ librosFavoritos.length !== 1 ? 's' : '' }}
    </span>

    <!-- Enlace de vuelta a la tienda mediante routing -->
    <a class="boton-volver" routerLink="/tienda">← Volver a la tienda</a>
  </div>

  <!-- LISTA DE FAVORITOS -->
  <div *ngIf="librosFavoritos.length > 0; else sinFavoritos">

    <div class="rejilla-favoritos">

      <div *ngFor="let libro of librosFavoritos">

        <app-tarjeta-libro [libro]="libro"></app-tarjeta-libro>

      </div>

    </div>

  </div>

  <!-- SI NO HAY FAVORITOS -->
  <ng-template #sinFavoritos>
    <div class="sin-favoritos">
      <p>🤍</p>
      <p>Aún no tienes favoritos</p>
      <span>Pulsa ❤️ Favoritos en cualquier libro para guardarlo aquí</span>
    </div>
  </ng-template>

</div>
