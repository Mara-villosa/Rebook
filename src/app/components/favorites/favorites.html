<div class="container mt-5">
  <h2>Mis Libros Favoritos</h2>
  <hr />

  <div *ngIf="misFavoritos.length === 0" class="alert alert-info">
    Aún no has añadido ningún libro a tus favoritos. ¡Explora el catálogo y dale al corazón!
  </div>

  <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4" *ngIf="misFavoritos.length > 0">
    <div class="col" *ngFor="let libro of misFavoritos">
      <div class="card h-100 shadow-sm">
        <img
          [src]="libro.imageUrl || 'https://via.placeholder.com/150x200?text=Portada'"
          class="card-img-top"
          alt="Portada del libro"
        />

        <div class="card-body">
          <h5 class="card-title">{{ libro.title }}</h5>
          <p class="card-text text-muted">{{ libro.author }}</p>
          <h6 class="text-success">{{ libro.price }} €</h6>
        </div>

        <div
          class="card-footer bg-white border-top-0 d-flex justify-content-between align-items-center"
        >
          <button class="btn btn-sm btn-outline-primary">Ver detalles</button>

          <button
            class="btn btn-link text-danger p-0"
            (click)="favoritesService.toggleFavorite(libro)"
          >
            Quitar ♥
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
