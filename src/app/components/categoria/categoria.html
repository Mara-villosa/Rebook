<div class="categoria-container">
  @if (this.categoria !== 'all') {
    <h2 class="categoria-title">{{ categoria }}</h2>
  }

  @if (libros.length === 0) {
    <p role="status" aria-live="polite">No hay libros en esta categoría</p>
  }

  <div class="libros-grid">
    @for (libro of libros; track libro.id) {
      <div
        class="libro-card"
        tabindex="0"
        role="article"
        [attr.aria-label]="'Libro ' + libro.title + ' de ' + libro.author"
      >
        <img [src]="libro.url" [alt]="'Portada del libro ' + libro.title" />

        <div class="libro-info">
          <h4>{{ libro.title }}</h4>
          <p>{{ libro.author }}</p>
        </div>
      </div>
    }
  </div>
</div>
