<h2 id="mis-pedidos">Mis pedidos</h2>

<div *ngIf="errorMessage" class="toast-error">{{ errorMessage }}</div>
<div *ngIf="successMessage" class="toast-success">{{ successMessage }}</div>

<!-- LIBROS ALQUILADOS -->
<div class="cart-section" role="region" aria-labelledby="alquilados-title">

  <div class="section-header">
    <h3 id="alquilados-title">Libros alquilados</h3>
  </div>

  <div *ngIf="rentedBooks.length === 0" role="status" aria-live="polite">
    <p class="empty">No tienes libros alquilados</p>
  </div>

  <div *ngFor="let item of rentedBooks" class="cart-row" role="listitem">

    <img [src]="item.url" [alt]="'Portada de ' + item.title" />

    <div class="info">
      <p class="titulo">{{ item.title }}</p>
      <p class="autor">{{ item.author }}</p>
      <p class="fecha">  Devolver: {{ item.rent_expiration_date | date:'shortDate' }}</p>
    </div>
    <div class="acciones">

      <button class="btn-extend" (click)="extenderAlquiler(item)" type="button"
        aria-label="Extender alquiler del libro {{ item.title }}"> Extender
      </button>

      <button class="btn-return" (click)="devolverLibro(item)" type="button"
        aria-label="Devolver libro {{ item.title }}"> Devolver
      </button>
    </div>
  </div>
</div>
