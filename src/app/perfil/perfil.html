<h2>Mi perfil</h2>
<div *ngIf="loading">Cargando datos...</div>
<div class="profile-container" *ngIf="!loading">

  <!-- LADO IZQUIERDO -->
<div class="profile-left">

 

  <!-- SOLO LECTURA -->
  <div class="profile-summary">
    <p><strong>Nombre:</strong> {{ user.name }}</p>
    <p><strong>Email:</strong> {{ user.email }}</p>
    <p><strong>Teléfono:</strong> {{ user.phone }}</p>
    <p><strong>Dirección:</strong> {{ user.address }}, {{ user.city }} {{ user.postalCode }}</p>
  </div>

  <button class="edit-btn" (click)="editMode = !editMode">
    {{ editMode ? 'Cancelar edición' : 'Cambiar información' }}
  </button>

  <!-- FORM EDITABLE -->
  <form *ngIf="editMode" (ngSubmit)="guardar()" class="profile-form">

    <input [(ngModel)]="user.name" name="name" placeholder="Nombre">
    <input [(ngModel)]="user.phone" name="phone" placeholder="Teléfono">

    <input [(ngModel)]="user.address" name="street" placeholder="Calle">
    <input [(ngModel)]="user.city" name="city" placeholder="Ciudad">
    <input [(ngModel)]="user.postalCode" name="cp" placeholder="CP">

    <button type="submit" class="save-btn">Guardar cambios</button>

    <button type="button" class="password-btn" (click)="showPassword = !showPassword">
      Cambiar contraseña
    </button>

    <div *ngIf="showPassword" class="password-box">

      <input type="password" [(ngModel)]="oldPassword" name="oldPassword" placeholder="Contraseña actual">
      <input type="password" [(ngModel)]="newPassword" name="newPassword" placeholder="Nueva contraseña">
      <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Confirmar contraseña">

    </div>

  </form>

</div>

  <!-- LADO DERECHO -->
  <div class="profile-right">
    <div class="books-header">
      <h3>Mis libros subidos</h3> <button class="add-btn" (click)="abrirModalLibro()"> + Añadir libro </button>
    </div>

    <!-- TABS -->
    <div class="tabs"> 
      <button (click)="tab='uploads'">Subidos</button> 
      <button (click)="tab='bought'">Comprados</button> <button (click)="tab='rented'">Alquilados</button>
    </div>

    <!-- LISTA -->
    <div *ngFor="let book of getBooks(tab)" class="cart-row"> 
      <img [src]="book.url">
      <div class="info">
        <p class="titulo">{{ book.title }}</p>
        <p class="autor">{{ book.author }}</p>
      </div>
      <div class="acciones">
        <p class="precio"> {{ book.sellPrice || book.rentPrice }}€ </p> 
        <button (click)="deleteBook(book.id)" class="delete">🗑</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL AÑADIR LIBRO -->
<div class="modal-overlay" *ngIf="showBookModal">

  <div class="modal-pago">

    <h3>Añadir libro</h3>

    <input [(ngModel)]="newBook.title" name="title" placeholder="Título">
    <input [(ngModel)]="newBook.author" name="author" placeholder="Autor">
    <input [(ngModel)]="newBook.isbn" name="isbn" placeholder="ISBN">
    <input [(ngModel)]="newBook.category" name="category" placeholder="Categoría">
    <input [(ngModel)]="newBook.url" name="url" placeholder="URL portada">

    <div class="price-group">
      <label>Precio de venta</label>
      <div class="price-input">
        <input type="number" [(ngModel)]="newBook.sell_price" name="sell" placeholder="0.00">
        <span>€</span>
      </div>
    </div>

    <div class="price-group">
      <label>Precio de alquiler</label>
      <div class="price-input">
        <input type="number" [(ngModel)]="newBook.rent_price" name="rent" placeholder="0.00">
        <span>€</span>
      </div>
    </div>

    <div class="acciones-modal">
      <button (click)="cerrarModalLibro()">Cancelar</button>
      <button (click)="crearLibro()">Guardar</button>
    </div>

  </div>

</div>
