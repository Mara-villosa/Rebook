<!-- Vista de libros favoritos -->
<main class="contenedor-favoritos" aria-labelledby="titulo-favoritos">

  <!-- Cabecera -->
  <header class="cabecera-favoritos">
    <h2 id="titulo-favoritos">❤️ Mis favoritos</h2>
    <span class="contador-favoritos">
      {{ librosFavoritos.length }} libro{{ librosFavoritos.length !== 1 ? 's' : '' }}
    </span>
    <a class="boton-volver" routerLink="/home" aria-label="Volver a la tienda"> ← Volver a la tienda </a>
  </header>

  <!-- LISTA -->
  <section *ngIf="librosFavoritos.length > 0; else sinFavoritos">
    <div class="rejilla-favoritos">
      <article class="favorito-item" *ngFor="let libro of librosFavoritos">
        <app-tarjeta-libro class="fila" [libro]="libro"></app-tarjeta-libro>
      </article>
    </div>
  </section>

  <!-- SIN FAVORITOS -->
  <ng-template #sinFavoritos>
    <section class="sin-favoritos" role="status" aria-live="polite">
      <p aria-hidden="true">🤍</p>
      <p>Aún no tienes favoritos</p>
      <span> Pulsa ❤️ Favoritos en cualquier libro para guardarlo aquí</span>
    </section>
  </ng-template>

</main>
